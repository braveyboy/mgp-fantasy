<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MGP Fantasy League</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f0f4f8;
    --navy:#37003c;
    --navy-mid:#4a0050;
    --navy-light:#5c0064;
    --card:#ffffff;
    --card-alt:#f8f9fa;
    --gold:#00ff87;
    --gold-light:#00e077;
    --gold-dim:#00a855;
    --white:#1a1a2e;
    --muted:#6b7280;
    --green:#00ff87;
    --col-gk:#d4a017;
    --col-def:#01b4e4;
    --col-mid:#5cb85c;
    --col-fwd:#e74c3c;
    --border:rgba(55,0,60,0.12);
    --border-hi:rgba(55,0,60,0.35);
    --shadow:0 2px 8px rgba(0,0,0,0.08);
    --shadow-lg:0 4px 20px rgba(55,0,60,0.15);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;width:100%;max-width:100vw;}
  body::before{display:none;}
  .grain{position:fixed;inset:0;opacity:0.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");pointer-events:none;z-index:0;}
  header{position:relative;z-index:10;padding:0 20px;background:var(--navy);box-shadow:0 2px 12px rgba(0,0,0,0.25);}
  .header-inner{max-width:720px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:14px 0;}
  .logo-block{display:flex;align-items:center;gap:10px;min-width:0;}
  .logo-badge{width:38px;height:38px;background:linear-gradient(135deg,var(--gold),#a07838);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--navy);flex-shrink:0;}
  .logo-text{display:flex;flex-direction:column;line-height:1;min-width:0;}
  .logo-main{font-family:'Bebas Neue',sans-serif;font-size:20px;color:#00ff87;letter-spacing:1.5px;}
  .logo-sub{font-size:9px;color:rgba(255,255,255,0.6);letter-spacing:2px;text-transform:uppercase;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .gw-pill{background:var(--navy-light);border:1px solid var(--border-hi);border-radius:20px;padding:5px 12px;display:flex;align-items:center;gap:6px;flex-shrink:0;}
  .gw-pill .label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;}
  .gw-pill .num{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--gold);line-height:1;}
  nav{position:relative;z-index:10;padding:0 20px;background:var(--navy-mid);border-bottom:2px solid rgba(0,255,135,0.3);}
  .nav-inner{max-width:720px;margin:0 auto;display:flex;}
  .nav-item{padding:10px 14px;font-size:12px;letter-spacing:1.2px;text-transform:uppercase;color:rgba(255,255,255,0.6);cursor:pointer;border-bottom:2px solid transparent;font-weight:600;transition:color .2s,border-color .2s;}
  .nav-item.active{color:#00ff87;border-bottom-color:#00ff87;}
  main{position:relative;z-index:5;max-width:720px;margin:0 auto;padding:20px 12px 100px;background:var(--bg);width:100%;box-sizing:border-box;}
  .page{display:none;}.page.active{display:block;}
  .status-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:8px;}
  .section-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--navy);}
  .bonus-badge{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:6px;font-size:11px;font-weight:500;}
  .badge-confirmed{background:#00cc6a;border:none;color:#fff;}
  .badge-pending{background:#f59e0b;border:none;color:#fff;}
  .badge-checking{background:#6b7280;border:none;color:#fff;}
  .pulse-dot{width:7px;height:7px;border-radius:50%;background:currentColor;animation:pulse 2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .loading-state{display:flex;flex-direction:column;align-items:center;padding:60px 20px;gap:14px;color:var(--muted);}
  .spinner{width:34px;height:34px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-text{font-size:13px;}
  .error-state{padding:20px;background:rgba(220,80,60,.08);border:1px solid rgba(220,80,60,.2);border-radius:10px;color:#e07060;font-size:13px;line-height:1.6;}
  .matchups-grid{display:flex;flex-direction:column;gap:10px;}
  .matchup-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .25s,box-shadow .2s;animation:cardIn .35s ease both;box-shadow:var(--shadow);}
  .matchup-card:nth-child(1){animation-delay:.05s}.matchup-card:nth-child(2){animation-delay:.1s}
  .matchup-card:nth-child(3){animation-delay:.15s}.matchup-card:nth-child(4){animation-delay:.2s}
  @keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .matchup-card:hover{border-color:var(--navy);box-shadow:var(--shadow-lg);}
  .card-header{padding:10px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;background:var(--navy);}
  .match-label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,0.7);font-weight:600;}
  .card-toggle{margin-left:auto;font-size:12px;color:rgba(255,255,255,0.6);transition:transform .25s;display:inline-block;}
  .card-toggle.open{transform:rotate(180deg);}
  .live-chip{background:#00cc6a;border:none;color:#fff;font-size:9px;padding:3px 8px;border-radius:4px;letter-spacing:1px;text-transform:uppercase;font-weight:700;display:flex;align-items:center;gap:4px;}
  .live-chip .dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 1.5s ease-in-out infinite;}
  .fin-chip{background:#6b7280;border:none;color:#fff;font-size:9px;padding:3px 8px;border-radius:4px;letter-spacing:1px;text-transform:uppercase;font-weight:700;}
  .finals-chip{background:var(--navy);border:none;color:#00ff87;font-size:9px;padding:3px 8px;border-radius:4px;letter-spacing:1px;text-transform:uppercase;font-weight:700;}

  /* FIX 1: Mobile score layout - prevent overflow */
  .card-scores{padding:12px 8px 10px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:4px;cursor:pointer;min-width:0;overflow:hidden;}
  .team-side{display:flex;flex-direction:column;gap:5px;min-width:0;}
  .team-side.right{align-items:flex-end;text-align:right;}
